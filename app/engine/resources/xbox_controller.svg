<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560">
  <defs>
    <linearGradient id="bdy" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#404046"/>
      <stop offset="50%"  stop-color="#28282c"/>
      <stop offset="100%" stop-color="#1c1c20"/>
    </linearGradient>
    <linearGradient id="trig" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#3c3c42"/>
      <stop offset="100%" stop-color="#1e1e22"/>
    </linearGradient>
    <linearGradient id="bump" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#4a4a52"/>
      <stop offset="100%" stop-color="#2c2c32"/>
    </linearGradient>
    <linearGradient id="grpL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1e1e22"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>
    <linearGradient id="grpR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e1e22"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-6%" width="125%" height="120%">
      <feDropShadow dx="4" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <radialGradient id="facePanel" cx="50%" cy="42%" r="55%">
      <stop offset="0%"   stop-color="#2e2e34"/>
      <stop offset="100%" stop-color="#1a1a1e"/>
    </radialGradient>
  </defs>

  <!-- ── Drop shadow group ────────────────────────────────────────────────── -->
  <g filter="url(#sh)">

    <!-- MAIN BODY -->
    <path d="
      M 240,96
      C 272,90 304,88 326,94
      C 334,97 340,102 342,110
      C 354,120 374,124 388,132
      C 400,140 406,154 406,170
      C 408,188 406,204 404,222
      C 402,240 404,258 408,278
      C 414,298 420,318 420,340
      C 420,362 416,382 404,396
      C 392,410 374,418 354,418
      C 334,418 318,408 308,394
      C 298,380 292,362 284,348
      C 276,334 262,324 240,322
      C 218,324 204,334 196,348
      C 188,362 182,380 172,394
      C 162,408 146,418 126,418
      C 106,418 88,410 76,396
      C 64,382 60,362 60,340
      C 60,318 66,298 72,278
      C 76,258 78,240 76,222
      C 74,204 72,188 74,170
      C 74,154 80,140 92,132
      C 106,124 126,120 138,110
      C 140,102 146,97 154,94
      C 176,88 208,90 240,96 Z"
      fill="url(#bdy)" stroke="#0e0e12" stroke-width="2.5"/>

    <!-- LEFT TRIGGER -->
    <path d="
      M 154,96
      C 148,82 140,66 130,50
      C 120,32 106,14 90,6
      C 74,0 58,4 48,16
      C 38,28 38,48 42,66
      C 46,80 56,92 68,100
      C 80,106 98,106 112,102
      C 128,98 144,96 154,96 Z"
      fill="url(#trig)" stroke="#0e0e12" stroke-width="2.5"/>

    <!-- RIGHT TRIGGER -->
    <path d="
      M 326,96
      C 332,82 340,66 350,50
      C 360,32 374,14 390,6
      C 406,0 422,4 432,16
      C 442,28 442,48 438,66
      C 434,80 424,92 412,100
      C 400,106 382,106 368,102
      C 352,98 336,96 326,96 Z"
      fill="url(#trig)" stroke="#0e0e12" stroke-width="2.5"/>

    <!-- LEFT BUMPER -->
    <path d="
      M 76,134
      C 90,120 112,110 134,104
      C 145,100 153,96 154,96
      C 148,108 144,118 136,126
      C 120,132 96,136 76,134 Z"
      fill="url(#bump)" stroke="#0e0e12" stroke-width="1.5"/>

    <!-- RIGHT BUMPER -->
    <path d="
      M 404,134
      C 390,120 368,110 346,104
      C 335,100 327,96 326,96
      C 332,108 336,118 344,126
      C 360,132 384,136 404,134 Z"
      fill="url(#bump)" stroke="#0e0e12" stroke-width="1.5"/>

  </g>

  <!-- ── Grip texture (darker rubber panels) ─────────────────────────────── -->
  <path d="M 62,290 C 58,312 58,335 60,352 C 64,368 72,382 80,392
           C 72,374 68,352 68,332 C 68,310 74,290 80,274 Z"
        fill="url(#grpL)" opacity="0.85"/>
  <path d="M 418,290 C 422,312 422,335 420,352 C 416,368 408,382 400,392
           C 408,374 412,352 412,332 C 412,310 406,290 400,274 Z"
        fill="url(#grpR)" opacity="0.85"/>

  <!-- ── Body surface highlights ──────────────────────────────────────────── -->
  <path d="M 156,96 C 188,84 220,80 240,80 C 260,80 292,84 324,96"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 50,58 C 46,38 52,18 64,9 C 76,2 90,3 102,10"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 430,58 C 434,38 428,18 416,9 C 404,2 390,3 378,10"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Recessed face zone ───────────────────────────────────────────────── -->
  <ellipse cx="240" cy="205" rx="158" ry="108" fill="rgba(0,0,0,0.13)"/>

  <!-- ── Stick wells ──────────────────────────────────────────────────────── -->
  <circle cx="166" cy="180" r="50" fill="#101014" stroke="#090910" stroke-width="2"/>
  <circle cx="166" cy="180" r="46" fill="#181820"/>
  <circle cx="302" cy="268" r="50" fill="#101014" stroke="#090910" stroke-width="2"/>
  <circle cx="302" cy="268" r="46" fill="#181820"/>

  <!-- ── D-pad socket ──────────────────────────────────────────────────────── -->
  <rect x="158" y="244" width="56" height="56" rx="8" ry="8"
        fill="#0c0c10" stroke="#090910" stroke-width="1.5"/>

  <!-- ── Face button panel ─────────────────────────────────────────────────── -->
  <circle cx="318" cy="180" r="58" fill="#101014" stroke="#090910" stroke-width="1.5" opacity="0.75"/>

  <!-- ── Center panel ──────────────────────────────────────────────────────── -->
  <rect x="200" y="192" width="80" height="28" rx="14" ry="14"
        fill="#0e0e12" stroke="#090910" stroke-width="1.5" opacity="0.85"/>

</svg>
